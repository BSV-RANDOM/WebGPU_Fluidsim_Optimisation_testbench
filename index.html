<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGPU SPH Fluid – Dynamic N + Bounds</title>
<style>
    body { margin: 0; overflow: hidden; background-color: #111; color: #eee;
           font-family: sans-serif; }
    #ui  { position: absolute; top: 10px; left: 10px; z-index: 10;
           background: rgba(0,0,0,0.78); padding: 14px; border-radius: 8px;
           max-width: 560px; }
    button { padding: 8px 12px; margin: 3px 3px 3px 0; cursor: pointer;
             background: #333; color: white; border: 1px solid #555;
             border-radius: 4px; font-size: 13px; }
    button:hover { background: #555; }
    button:disabled { background: #222; color: #666; cursor: not-allowed; }
    input[type="number"] { background:#222; color:white; border:1px solid #555;
                           border-radius:4px; padding:6px 4px; }
    input[type="range"]  { vertical-align: middle; width: 130px; }
    .row  { margin-bottom: 6px; display: flex; align-items: center;
            gap: 10px; flex-wrap: wrap; }
    .brow { margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
            font-family: monospace; font-size: 12px; }
    .ax   { display:inline-block; width:14px; font-weight:bold; color:#fc6; }
    .vlbl { display:inline-block; min-width:38px; text-align:right; color:#9cf; }
    .sep  { color:#666; }
    #stats { margin-top: 10px; font-family: monospace; font-size: 12px;
             white-space: pre; }
    canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="ui">
    <div class="row">
        <label>Particles:
            <input type="number" id="n-input" value="16384"
                   min="256" max="262144" step="1024" style="width:90px">
        </label>
        <label>Steps/Frame:
            <input type="number" id="steps-input" value="5"
                   min="1" max="200" style="width:55px">
        </label>
    </div>
    <div class="brow">
        <span class="ax">X</span>
        <span class="vlbl" id="bx-min-val">-16.0</span>
        <input type="range" id="bx-min" min="-16" max="-0.5" step="0.5" value="-16">
        <span class="sep">/</span>
        <input type="range" id="bx-max" min="0.5" max="16" step="0.5" value="16">
        <span class="vlbl" id="bx-max-val">16.0</span>
    </div>
    <div class="brow">
        <span class="ax">Y</span>
        <span class="vlbl" id="by-min-val">-16.0</span>
        <input type="range" id="by-min" min="-16" max="-0.5" step="0.5" value="-16">
        <span class="sep">/</span>
        <input type="range" id="by-max" min="0.5" max="16" step="0.5" value="16">
        <span class="vlbl" id="by-max-val">16.0</span>
    </div>
    <div class="brow">
        <span class="ax">Z</span>
        <span class="vlbl" id="bz-min-val">-16.0</span>
        <input type="range" id="bz-min" min="-16" max="-0.5" step="0.5" value="-16">
        <span class="sep">/</span>
        <input type="range" id="bz-max" min="0.5" max="16" step="0.5" value="16">
        <span class="vlbl" id="bz-max-val">16.0</span>
    </div>
    <div class="row">
        <button id="btn-render">▶ Start Render</button>
        <button id="btn-benchmark">⏱ Run Benchmark</button>
        <button id="btn-reset">↻ Reset Particles</button>
        <button id="btn-stop">■ Stop</button>
    </div>
    <div id="stats">Set N + bounds, then press Start Render or Run Benchmark.
Sliders update bounds live during render.</div>
</div>
<canvas id="glcanvas"></canvas>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// 0. DOM + ERROR RELAY
// ─────────────────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('glcanvas');
canvas.width   = window.innerWidth;
canvas.height  = window.innerHeight;
const statsDiv = document.getElementById('stats');

const _CE = console.error.bind(console);
console.error = (...a) => {
    _CE(...a);
    const m = a.map(x => (x && x.message) ? x.message
        : (typeof x === 'object' ? JSON.stringify(x) : String(x))).join(' ');
    if (statsDiv) statsDiv.innerText += '\n[ERR] ' + m;
};

// ─────────────────────────────────────────────────────────────────────────────
// 1. CONSTANTS — fixed for the lifetime of the page
// ─────────────────────────────────────────────────────────────────────────────
const WORLD       = 32;       // simulation domain extent (centered on origin → [-16, 16])
const HALF_WORLD  = 16;
const WORLD_BOUND = 31.99;    // max cell index after shift+floor
const Z_MULT      = 1024;     // 32 * 32
const NCELLS      = 32768;    // 32³

const WGP = 256, WGS = 256, WGC = 256;
const NBLOCKS    = Math.ceil(NCELLS / WGS);   // 128
const WGCOUNT_C  = Math.ceil(NCELLS / WGC);   // 128
const WGCOUNT_S  = Math.ceil(NCELLS / WGS);   // 128

const C16  = NCELLS * 16;
const C4   = NCELLS * 4;
const BLK4 = Math.max(NBLOCKS, WGS) * 4;

// ─────────────────────────────────────────────────────────────────────────────
// 2. RUNTIME STATE
// ─────────────────────────────────────────────────────────────────────────────
let device, gpuCtx, canvasFmt, hasTimestamps;
let initialized   = false;
let pipelinesBuilt= false;

let N = 16384;
const bounds = {
    minX: -16, maxX: 16,
    minY: -16, maxY: 16,
    minZ: -16, maxZ: 16,
};

const pipelines        = {};
const bgls             = {};
const cellBuffers      = {};
const cellBindGroups   = {};
let   particleBuffers  = null;
let   particleBindGroups = null;

let paramsBuf, aspectBuf, depthTex, syncBuf;
let readState, writeState;

let isRendering    = false;
let isBenchmarking = false;
let animId         = null;

// ─────────────────────────────────────────────────────────────────────────────
// 3. SMALL HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const U    = GPUBufferUsage;
const RWCS = U.STORAGE | U.COPY_SRC | U.COPY_DST;

function mkBuf(label, bytes, usage, init) {
    const b = device.createBuffer({ label, size: Math.max(bytes, 16), usage });
    if (init) device.queue.writeBuffer(b, 0, init);
    return b;
}
function mkMod(label, code) {
    const m = device.createShaderModule({ label, code });
    if (m.getCompilationInfo) m.getCompilationInfo().then(info => {
        for (const msg of info.messages)
            if (msg.type === 'error')
                console.error(`[${label}] line ${msg.lineNum}: ${msg.message}`);
    });
    return m;
}
function mkBGL(label, entries) { return device.createBindGroupLayout({ label, entries }); }
function ro(b)        { return { binding: b, visibility: GPUShaderStage.COMPUTE,
                                 buffer: { type: 'read-only-storage' } }; }
function rw(b)        { return { binding: b, visibility: GPUShaderStage.COMPUTE,
                                 buffer: { type: 'storage' } }; }
function uni(b, vis)  { return { binding: b, visibility: vis,
                                 buffer: { type: 'uniform' } }; }
function mkCP(label, mod, bgl) {
    return device.createComputePipeline({
        label,
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        compute: { module: mod, entryPoint: 'cs_main' },
    });
}
function mkBG(layout, entries) {
    return device.createBindGroup({
        layout,
        entries: entries.map(([b, buf]) => ({ binding: b, resource: { buffer: buf } }))
    });
}

// ─────────────────────────────────────────────────────────────────────────────
// 4. ONE-TIME WEBGPU INIT
// ─────────────────────────────────────────────────────────────────────────────
async function initWebGPU() {
    if (initialized) return;
    if (!navigator.gpu) throw new Error('WebGPU not supported.');
    const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
    if (!adapter) throw new Error('No WebGPU adapter.');

    hasTimestamps = adapter.features.has('timestamp-query');
    device = await adapter.requestDevice({
        requiredFeatures: hasTimestamps ? ['timestamp-query'] : [],
    });
    device.addEventListener('uncapturederror',
        ev => console.error('WebGPU uncaptured:', ev.error.message ?? ev.error));

    canvasFmt = navigator.gpu.getPreferredCanvasFormat();
    gpuCtx    = canvas.getContext('webgpu');
    gpuCtx.configure({ device, format: canvasFmt, alphaMode: 'opaque' });

    initialized = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// 5. ONE-TIME PIPELINE / CELL-BUFFER / UNIFORM CONSTRUCTION
//
//    These never get rebuilt because:
//      • Workgroup sizes & cell-grid dims are compile-time constants in WGSL.
//      • N and bounds live in a UNIFORM, so changing them costs zero shader recomp.
// ─────────────────────────────────────────────────────────────────────────────
function buildPipelinesOnce() {
    if (pipelinesBuilt) return;

    const PARAMS = `
struct Params {
    numParticles : u32,
    _pad0 : u32, _pad1 : u32, _pad2 : u32,
    bounds_min : vec3f,
    bounds_max : vec3f,
}`;

    // ── 5.1 Hash + atomic count (fused) ──────────────────────────────────────
    const HASH_CS = `
${PARAMS}
@group(0) @binding(0) var<storage, read>       pos     : array<vec4f>;
@group(0) @binding(1) var<storage, read_write> hashOut : array<vec4f>;
@group(0) @binding(2) var<storage, read_write> counts  : array<atomic<u32>>;
@group(0) @binding(3) var<uniform>             params  : Params;

const WORLD_BOUND : f32 = 31.99;
const WORLD_U     : u32 = 32u;
const Z_MULT_U    : u32 = 1024u;
const HALF_WORLD  : f32 = 16.0;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let id = gid.x;
    if (id >= params.numParticles) { return; }

    let pd       = pos[id];
    let pShifted = pd.xyz + vec3f(HALF_WORLD);              // [-16,16] -> [0,32]
    let pClamped = clamp(pShifted, vec3f(0.0), vec3f(WORLD_BOUND));
    let cell3D   = vec3u(floor(pClamped));
    let cellId   = cell3D.x + cell3D.y * WORLD_U + cell3D.z * Z_MULT_U;

    hashOut[id] = vec4f(f32(cellId), pd.w, 0.0, 0.0);
    atomicAdd(&counts[cellId], 1u);
}`;

    // ── 5.2 Prefix-sum phase 1 (Kogge-Stone, exclusive scan within block) ────
    const SCAN1_CS = `
@group(0) @binding(0) var<storage, read>        cntIn    : array<u32>;
@group(0) @binding(1) var<storage, read_write>  prefOut  : array<u32>;
@group(0) @binding(2) var<storage, read_write>  blockOut : array<u32>;

var<workgroup> smem : array<u32, 256>;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u,
           @builtin(local_invocation_id)  lid : vec3u,
           @builtin(workgroup_id)         wid : vec3u) {
    let g = gid.x; let l = lid.x;
    smem[l] = select(0u, cntIn[g], g < 32768u);
    workgroupBarrier();

    for (var stride = 1u; stride < 256u; stride <<= 1u) {
        let v = smem[l] + select(0u, smem[l - stride], l >= stride);
        workgroupBarrier();
        smem[l] = v;
        workgroupBarrier();
    }
    if (l == 255u) { blockOut[wid.x] = smem[l]; }
    workgroupBarrier();

    let excl = select(0u, smem[l - 1u], l > 0u);
    if (g < 32768u) { prefOut[g] = excl; }
}`;

    // ── 5.3 Prefix-sum phase 2 (single workgroup scans block totals) ─────────
    const SCAN2_CS = `
@group(0) @binding(0) var<storage, read_write> blockBuf : array<u32>;
var<workgroup> smem : array<u32, 256>;

@compute @workgroup_size(256)
fn cs_main(@builtin(local_invocation_id) lid : vec3u) {
    let l = lid.x;
    smem[l] = select(0u, blockBuf[l], l < 128u);
    workgroupBarrier();
    for (var stride = 1u; stride < 256u; stride <<= 1u) {
        let v = smem[l] + select(0u, smem[l - stride], l >= stride);
        workgroupBarrier();
        smem[l] = v;
        workgroupBarrier();
    }
    let excl = select(0u, smem[l - 1u], l > 0u);
    if (l < 128u) { blockBuf[l] = excl; }
}`;

    // ── 5.4 Prefix-sum phase 3 (add block offsets) ───────────────────────────
    const SCAN3_CS = `
@group(0) @binding(0) var<storage, read>       blockBuf : array<u32>;
@group(0) @binding(1) var<storage, read_write> prefBuf  : array<u32>;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u,
           @builtin(workgroup_id) wid : vec3u) {
    let g = gid.x;
    if (g >= 32768u) { return; }
    prefBuf[g] += blockBuf[wid.x];
}`;

    // ── 5.5 Build (startIdx, count) per cell ─────────────────────────────────
    const BGRID_CS = `
@group(0) @binding(0) var<storage, read>       cntBuf  : array<u32>;
@group(0) @binding(1) var<storage, read>       preBuf  : array<u32>;
@group(0) @binding(2) var<storage, read_write> gridOut : array<vec4f>;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let cell = gid.x;
    if (cell >= 32768u) { return; }
    gridOut[cell] = vec4f(f32(preBuf[cell]), f32(cntBuf[cell]), 0.0, 0.0);
}`;

    // ── 5.6 Scatter: pack (pos.xyz, originalId) into spatially sorted layout ─
    const SCATTER_CS = `
${PARAMS}
@group(0) @binding(0) var<storage, read>       posBuf   : array<vec4f>;
@group(0) @binding(1) var<storage, read>       hashBuf  : array<vec4f>;
@group(0) @binding(2) var<storage, read_write> offsets  : array<atomic<u32>>;
@group(0) @binding(3) var<storage, read_write> sortOut  : array<vec4f>;
@group(0) @binding(4) var<uniform>             params   : Params;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let id = gid.x;
    if (id >= params.numParticles) { return; }
    let cellId = u32(hashBuf[id].x);
    let p      = posBuf[id].xyz;
    let slot   = atomicAdd(&offsets[cellId], 1u);
    sortOut[slot] = vec4f(p, f32(id));
}`;

    // ── 5.7 Density (Poly6) ───────────────────────────────────────────────────
    const DENSITY_CS = `
${PARAMS}
@group(0) @binding(0) var<storage, read>       sortBuf : array<vec4f>;
@group(0) @binding(1) var<storage, read>       gridBuf : array<vec4f>;
@group(0) @binding(2) var<storage, read>       posBuf  : array<vec4f>;
@group(0) @binding(3) var<storage, read_write> denOut  : array<vec4f>;
@group(0) @binding(4) var<uniform>             params  : Params;

const WORLD_MAX  : i32 = 31;
const WORLD_U    : u32 = 32u;
const Z_MULT_U   : u32 = 1024u;
const HALF_WORLD : f32 = 16.0;
const POLY6      : f32 = 315.0 / (64.0 * 3.14159265358979);

fn cellIdx(c : vec3i) -> u32 {
    let cl = clamp(c, vec3i(0), vec3i(WORLD_MAX));
    return u32(cl.x) + u32(cl.y) * WORLD_U + u32(cl.z) * Z_MULT_U;
}

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let id = gid.x;
    if (id >= params.numParticles) { return; }

    let myPos  = posBuf[id].xyz;
    let myCell = vec3i(floor(myPos + vec3f(HALF_WORLD)));
    var rho    = 0.0;

    for (var dz = -1; dz <= 1; dz++) {
    for (var dy = -1; dy <= 1; dy++) {
    for (var dx = -1; dx <= 1; dx++) {
        let nc = myCell + vec3i(dx, dy, dz);
        if (nc.x < 0 || nc.x > WORLD_MAX ||
            nc.y < 0 || nc.y > WORLD_MAX ||
            nc.z < 0 || nc.z > WORLD_MAX) { continue; }
        let gd  = gridBuf[cellIdx(nc)];
        let si  = i32(gd.x);
        let cnt = i32(gd.y);
        for (var k = 0; k < cnt; k++) {
            let nPos = sortBuf[si + k].xyz;
            let r2   = dot(myPos - nPos, myPos - nPos);
            if (r2 < 1.0) {
                let w = 1.0 - r2;
                rho += POLY6 * w * w * w;
            }
        }
    }}}
    denOut[id] = vec4f(max(rho, 0.0001), 0.0, 0.0, 0.0);
}`;

    // ── 5.8 Force (pressure + viscosity + gravity + wall bounce) ─────────────
    const FORCE_CS = `
${PARAMS}
@group(0) @binding(0) var<storage, read>       sortBuf : array<vec4f>;
@group(0) @binding(1) var<storage, read>       gridBuf : array<vec4f>;
@group(0) @binding(2) var<storage, read>       posBuf  : array<vec4f>;
@group(0) @binding(3) var<storage, read>       velBuf  : array<vec4f>;
@group(0) @binding(4) var<storage, read>       denBuf  : array<vec4f>;
@group(0) @binding(5) var<storage, read_write> velOut  : array<vec4f>;
@group(0) @binding(6) var<uniform>             params  : Params;

const WORLD_MAX    : i32 = 31;
const WORLD_U      : u32 = 32u;
const Z_MULT_U     : u32 = 1024u;
const HALF_WORLD   : f32 = 16.0;
const REST_DENSITY : f32 = 5.0;
const STIFFNESS    : f32 = 150.0;
const VISCOSITY    : f32 = 1.5;
const DT           : f32 = 0.005;
const SPIKY_GRAD   : f32 = -45.0 / 3.14159265358979;
const VISC_LAP     : f32 =  45.0 / 3.14159265358979;
const DAMPING      : f32 = 0.5;

fn cellIdx(c : vec3i) -> u32 {
    let cl = clamp(c, vec3i(0), vec3i(WORLD_MAX));
    return u32(cl.x) + u32(cl.y) * WORLD_U + u32(cl.z) * Z_MULT_U;
}

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let id = gid.x;
    if (id >= params.numParticles) { return; }

    let myPos  = posBuf[id].xyz;
    let myVel  = velBuf[id].xyz;
    let myRho  = denBuf[id].x;
    let myP    = STIFFNESS * (myRho - REST_DENSITY);
    let myCell = vec3i(floor(myPos + vec3f(HALF_WORLD)));

    var fPres = vec3f(0.0);
    var fVisc = vec3f(0.0);

    for (var dz = -1; dz <= 1; dz++) {
    for (var dy = -1; dy <= 1; dy++) {
    for (var dx = -1; dx <= 1; dx++) {
        let nc = myCell + vec3i(dx, dy, dz);
        if (nc.x < 0 || nc.x > WORLD_MAX ||
            nc.y < 0 || nc.y > WORLD_MAX ||
            nc.z < 0 || nc.z > WORLD_MAX) { continue; }
        let gd  = gridBuf[cellIdx(nc)];
        let si  = i32(gd.x);
        let cnt = i32(gd.y);
        for (var k = 0; k < cnt; k++) {
            let sData = sortBuf[si + k];
            let nPos  = sData.xyz;
            let nId   = u32(sData.w);
            if (nId == id) { continue; }
            let diff = myPos - nPos;
            let r    = length(diff);
            if (r > 0.0 && r < 1.0) {
                let dir  = diff / r;
                let nRho = denBuf[nId].x;
                let nVel = velBuf[nId].xyz;
                let nP   = STIFFNESS * (nRho - REST_DENSITY);
                let pT   = (myP + nP) / (2.0 * nRho);
                fPres   += -dir * pT * SPIKY_GRAD * pow(1.0 - r, 2.0);
                let vDiff = nVel - myVel;
                fVisc   += VISCOSITY * (vDiff / nRho) * VISC_LAP * (1.0 - r);
            }
        }
    }}}

    let grav  = vec3f(0.0, -9.8, 0.0);
    var newV  = myVel + ((fPres + fVisc + grav) / myRho) * DT;
    let next  = myPos + newV * DT;

    if (next.x < params.bounds_min.x || next.x > params.bounds_max.x) { newV.x *= -DAMPING; }
    if (next.y < params.bounds_min.y || next.y > params.bounds_max.y) { newV.y *= -DAMPING; }
    if (next.z < params.bounds_min.z || next.z > params.bounds_max.z) { newV.z *= -DAMPING; }

    velOut[id] = vec4f(newV, 0.0);
}`;

    // ── 5.9 Integrate (Euler + bound clamp) ──────────────────────────────────
    const INTEG_CS = `
${PARAMS}
@group(0) @binding(0) var<storage, read>       posBuf : array<vec4f>;
@group(0) @binding(1) var<storage, read>       velBuf : array<vec4f>;
@group(0) @binding(2) var<storage, read_write> posOut : array<vec4f>;
@group(0) @binding(3) var<uniform>             params : Params;

const DT : f32 = 0.005;

@compute @workgroup_size(256)
fn cs_main(@builtin(global_invocation_id) gid : vec3u) {
    let id = gid.x;
    if (id >= params.numParticles) { return; }
    let pd  = posBuf[id];
    let vel = velBuf[id].xyz;
    let pmin = params.bounds_min + vec3f(0.01);
    let pmax = params.bounds_max - vec3f(0.01);
    let np   = clamp(pd.xyz + vel * DT, pmin, pmax);
    posOut[id] = vec4f(np, pd.w);
}`;

    // ── 5.10 Render (particles as points + bounds wireframe as line-list) ────
    const RENDER_WGSL = `
${PARAMS}
struct Uniforms { aspect : f32 }

@group(0) @binding(0) var<uniform>            uni    : Uniforms;
@group(0) @binding(1) var<storage, read>      posBuf : array<vec4f>;
@group(0) @binding(2) var<uniform>            params : Params;

struct VsOut {
    @builtin(position) pos   : vec4f,
    @location(0)       depth : f32,
    @location(1)       col   : vec3f,
}

fn rotateCamera(p : vec3f) -> vec3f {
    let ry = -0.785;
    let cy = cos(ry); let sy = sin(ry);
    let rotY = mat3x3f(cy, 0.0, sy,  0.0, 1.0, 0.0,  -sy, 0.0, cy);
    let rx = -0.523;
    let cx = cos(rx); let sx = sin(rx);
    let rotX = mat3x3f(1.0, 0.0, 0.0,  0.0, cx, -sx,  0.0, sx, cx);
    return rotX * (rotY * p) - vec3f(0.0, 0.0, 60.0);
}

@vertex
fn vs_particle(@builtin(vertex_index) vIdx : u32) -> VsOut {
    let p   = posBuf[vIdx].xyz;
    let cam = rotateCamera(p);
    var o : VsOut;
    o.pos   = vec4f(cam.x / uni.aspect, cam.y, 0.0, -cam.z);
    o.depth = cam.z;
    o.col   = vec3f(0.2, 0.6, 1.0);
    return o;
}

@vertex
fn vs_box(@builtin(vertex_index) vIdx : u32) -> VsOut {
    var corners = array<vec3f, 8>(
        vec3f(0.0,0.0,0.0), vec3f(1.0,0.0,0.0),
        vec3f(1.0,1.0,0.0), vec3f(0.0,1.0,0.0),
        vec3f(0.0,0.0,1.0), vec3f(1.0,0.0,1.0),
        vec3f(1.0,1.0,1.0), vec3f(0.0,1.0,1.0)
    );
    var edges = array<u32, 24>(
        0u,1u, 1u,2u, 2u,3u, 3u,0u,
        4u,5u, 5u,6u, 6u,7u, 7u,4u,
        0u,4u, 1u,5u, 2u,6u, 3u,7u
    );
    let unit = corners[edges[vIdx]];
    let p    = params.bounds_min + unit * (params.bounds_max - params.bounds_min);
    let cam  = rotateCamera(p);
    var o : VsOut;
    o.pos   = vec4f(cam.x / uni.aspect, cam.y, 0.0, -cam.z);
    o.depth = cam.z;
    o.col   = vec3f(1.0, 0.78, 0.15);
    return o;
}

@fragment
fn fs_main(in : VsOut) -> @location(0) vec4f {
    let df = clamp((in.depth + 90.0) / 60.0, 0.2, 1.0);
    return vec4f(in.col * df, 1.0);
}`;

    // ── Compile modules ──────────────────────────────────────────────────────
    const modH  = mkMod('hash',     HASH_CS);
    const modS1 = mkMod('scan1',    SCAN1_CS);
    const modS2 = mkMod('scan2',    SCAN2_CS);
    const modS3 = mkMod('scan3',    SCAN3_CS);
    const modBG = mkMod('bgrid',    BGRID_CS);
    const modSc = mkMod('scatter',  SCATTER_CS);
    const modD  = mkMod('density',  DENSITY_CS);
    const modF  = mkMod('force',    FORCE_CS);
    const modI  = mkMod('integ',    INTEG_CS);
    const modR  = mkMod('render',   RENDER_WGSL);

    // ── BGLs ─────────────────────────────────────────────────────────────────
    const COMP = GPUShaderStage.COMPUTE;
    const VERT = GPUShaderStage.VERTEX;

    bgls.hash    = mkBGL('bgl-hash',    [ro(0), rw(1), rw(2), uni(3, COMP)]);
    bgls.scan1   = mkBGL('bgl-scan1',   [ro(0), rw(1), rw(2)]);
    bgls.scan2   = mkBGL('bgl-scan2',   [rw(0)]);
    bgls.scan3   = mkBGL('bgl-scan3',   [ro(0), rw(1)]);
    bgls.bgrid   = mkBGL('bgl-bgrid',   [ro(0), ro(1), rw(2)]);
    bgls.scatter = mkBGL('bgl-scatter', [ro(0), ro(1), rw(2), rw(3), uni(4, COMP)]);
    bgls.density = mkBGL('bgl-density', [ro(0), ro(1), ro(2), rw(3), uni(4, COMP)]);
    bgls.force   = mkBGL('bgl-force',   [ro(0), ro(1), ro(2), ro(3), ro(4), rw(5), uni(6, COMP)]);
    bgls.integ   = mkBGL('bgl-integ',   [ro(0), ro(1), rw(2), uni(3, COMP)]);

    bgls.render  = mkBGL('bgl-render', [
        uni(0, VERT),
        { binding: 1, visibility: VERT, buffer: { type: 'read-only-storage' } },
        uni(2, VERT),
    ]);

    // ── Pipelines ────────────────────────────────────────────────────────────
    pipelines.hash    = mkCP('pip-hash',    modH,  bgls.hash);
    pipelines.scan1   = mkCP('pip-scan1',   modS1, bgls.scan1);
    pipelines.scan2   = mkCP('pip-scan2',   modS2, bgls.scan2);
    pipelines.scan3   = mkCP('pip-scan3',   modS3, bgls.scan3);
    pipelines.bgrid   = mkCP('pip-bgrid',   modBG, bgls.bgrid);
    pipelines.scatter = mkCP('pip-scatter', modSc, bgls.scatter);
    pipelines.density = mkCP('pip-density', modD,  bgls.density);
    pipelines.force   = mkCP('pip-force',   modF,  bgls.force);
    pipelines.integ   = mkCP('pip-integ',   modI,  bgls.integ);

    const renderLayout = device.createPipelineLayout({ bindGroupLayouts: [bgls.render] });

    pipelines.renderParticle = device.createRenderPipeline({
        label: 'pip-render-particle', layout: renderLayout,
        vertex:   { module: modR, entryPoint: 'vs_particle' },
        fragment: { module: modR, entryPoint: 'fs_main', targets: [{ format: canvasFmt }] },
        primitive:    { topology: 'point-list' },
        depthStencil: { format: 'depth24plus', depthWriteEnabled: true,  depthCompare: 'less' },
    });
    pipelines.renderBox = device.createRenderPipeline({
        label: 'pip-render-box', layout: renderLayout,
        vertex:   { module: modR, entryPoint: 'vs_box' },
        fragment: { module: modR, entryPoint: 'fs_main', targets: [{ format: canvasFmt }] },
        primitive:    { topology: 'line-list' },
        depthStencil: { format: 'depth24plus', depthWriteEnabled: false, depthCompare: 'less-equal' },
    });

    // ── Cell-grid buffers (sized by NCELLS — never change) ───────────────────
    cellBuffers.count  = mkBuf('count',  C4,   RWCS, null);
    cellBuffers.prefix = mkBuf('prefix', C4,   RWCS, null);
    cellBuffers.offset = mkBuf('offset', C4,   RWCS, null);
    cellBuffers.grid   = mkBuf('grid',   C16,  RWCS, null);
    cellBuffers.blocks = mkBuf('blocks', BLK4, RWCS, null);

    // ── Uniform buffers ──────────────────────────────────────────────────────
    paramsBuf = mkBuf('params', 48, U.UNIFORM | U.COPY_DST, null);
    aspectBuf = mkBuf('aspect', 16, U.UNIFORM | U.COPY_DST,
        new Float32Array([canvas.width / canvas.height, 0, 0, 0]));
    syncBuf   = device.createBuffer({ label: 'sync', size: 256,
                                      usage: U.COPY_DST | U.MAP_READ });
    depthTex  = device.createTexture({ label: 'depth',
        size: [canvas.width, canvas.height, 1],
        format: 'depth24plus', usage: GPUTextureUsage.RENDER_ATTACHMENT });

    // ── Cell-only bind groups (no particle dependency → built ONCE) ──────────
    cellBindGroups.scan1 = mkBG(bgls.scan1,
        [[0, cellBuffers.count],  [1, cellBuffers.prefix], [2, cellBuffers.blocks]]);
    cellBindGroups.scan2 = mkBG(bgls.scan2, [[0, cellBuffers.blocks]]);
    cellBindGroups.scan3 = mkBG(bgls.scan3,
        [[0, cellBuffers.blocks], [1, cellBuffers.prefix]]);
    cellBindGroups.bgrid = mkBG(bgls.bgrid,
        [[0, cellBuffers.count],  [1, cellBuffers.prefix], [2, cellBuffers.grid]]);

    updateParamsUniform();
    pipelinesBuilt = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// 6. PARTICLE-DEPENDENT RESOURCES — rebuilt only when N changes
// ─────────────────────────────────────────────────────────────────────────────
function initParticlePositions(N, b) {
    const pos = new Float32Array(N * 4);
    const vel = new Float32Array(N * 4);
    const xMin   = b.minX;
    const xRange = (b.maxX - b.minX) * 0.5;   // dam-break in left half
    const yMin   = b.minY, yR = b.maxY - b.minY;
    const zMin   = b.minZ, zR = b.maxZ - b.minZ;
    for (let i = 0; i < N; i++) {
        pos[i*4+0] = xMin + Math.random() * xRange;
        pos[i*4+1] = yMin + Math.random() * yR;
        pos[i*4+2] = zMin + Math.random() * zR;
        pos[i*4+3] = i;
    }
    return { initPos: pos, initVel: vel };
}

function buildParticleResources(newN) {
    N = newN;
    const P16 = N * 16;
    const { initPos, initVel } = initParticlePositions(N, bounds);

    // Old buffers' GPU memory is freed once pending commands complete + GC.
    particleBuffers = {
        posA:    mkBuf('posA',    P16, RWCS, initPos),
        posB:    mkBuf('posB',    P16, RWCS, null),
        velA:    mkBuf('velA',    P16, RWCS, initVel),
        velB:    mkBuf('velB',    P16, RWCS, null),
        hash:    mkBuf('hash',    P16, RWCS, null),
        sorted:  mkBuf('sorted',  P16, RWCS, null),
        density: mkBuf('density', P16, RWCS, null),
    };
    const pb = particleBuffers, cb = cellBuffers;

    particleBindGroups = {
        hashA:    mkBG(bgls.hash,    [[0, pb.posA], [1, pb.hash], [2, cb.count], [3, paramsBuf]]),
        hashB:    mkBG(bgls.hash,    [[0, pb.posB], [1, pb.hash], [2, cb.count], [3, paramsBuf]]),
        scatterA: mkBG(bgls.scatter, [[0, pb.posA], [1, pb.hash], [2, cb.offset], [3, pb.sorted], [4, paramsBuf]]),
        scatterB: mkBG(bgls.scatter, [[0, pb.posB], [1, pb.hash], [2, cb.offset], [3, pb.sorted], [4, paramsBuf]]),
        densityA: mkBG(bgls.density, [[0, pb.sorted], [1, cb.grid], [2, pb.posA], [3, pb.density], [4, paramsBuf]]),
        densityB: mkBG(bgls.density, [[0, pb.sorted], [1, cb.grid], [2, pb.posB], [3, pb.density], [4, paramsBuf]]),
        forceA:   mkBG(bgls.force,   [[0, pb.sorted], [1, cb.grid], [2, pb.posA], [3, pb.velA], [4, pb.density], [5, pb.velB], [6, paramsBuf]]),
        forceB:   mkBG(bgls.force,   [[0, pb.sorted], [1, cb.grid], [2, pb.posB], [3, pb.velB], [4, pb.density], [5, pb.velA], [6, paramsBuf]]),
        integA:   mkBG(bgls.integ,   [[0, pb.posA], [1, pb.velB], [2, pb.posB], [3, paramsBuf]]),
        integB:   mkBG(bgls.integ,   [[0, pb.posB], [1, pb.velA], [2, pb.posA], [3, paramsBuf]]),
        renderA:  mkBG(bgls.render,  [[0, aspectBuf], [1, pb.posA], [2, paramsBuf]]),
        renderB:  mkBG(bgls.render,  [[0, aspectBuf], [1, pb.posB], [2, paramsBuf]]),
    };

    readState  = { pos: pb.posA, vel: pb.velA };
    writeState = { pos: pb.posB, vel: pb.velB };

    updateParamsUniform();        // write new N into uniform
}

function resetParticles() {
    if (!particleBuffers) return;
    const { initPos, initVel } = initParticlePositions(N, bounds);
    device.queue.writeBuffer(particleBuffers.posA, 0, initPos);
    device.queue.writeBuffer(particleBuffers.velA, 0, initVel);
    device.queue.writeBuffer(particleBuffers.posB, 0, initPos);
    device.queue.writeBuffer(particleBuffers.velB, 0, initVel);
    readState  = { pos: particleBuffers.posA, vel: particleBuffers.velA };
    writeState = { pos: particleBuffers.posB, vel: particleBuffers.velB };
}

// ─────────────────────────────────────────────────────────────────────────────
// 7. UNIFORM WRITER (called from slider events + on N change)
//    Layout matches WGSL `Params` struct exactly.
// ─────────────────────────────────────────────────────────────────────────────
function updateParamsUniform() {
    if (!paramsBuf) return;
    const buf = new ArrayBuffer(48);
    new Uint32Array(buf, 0, 1)[0] = N;
    const f = new Float32Array(buf);
    f[4]  = bounds.minX; f[5]  = bounds.minY; f[6]  = bounds.minZ;
    f[8]  = bounds.maxX; f[9]  = bounds.maxY; f[10] = bounds.maxZ;
    device.queue.writeBuffer(paramsBuf, 0, buf);
}

// ─────────────────────────────────────────────────────────────────────────────
// 8. SIMULATION STEP  — identical structure to original optimised version
// ─────────────────────────────────────────────────────────────────────────────
function stepSimulation() {
    if (!particleBuffers) return;
    const isA = readState.pos === particleBuffers.posA;
    const dispP = Math.ceil(N / WGP);

    const enc = device.createCommandEncoder({ label: 'sim-step' });
    enc.clearBuffer(cellBuffers.count, 0, C4);

    const cp1 = enc.beginComputePass({ label: 'sort-pass' });
    cp1.setPipeline(pipelines.hash);
    cp1.setBindGroup(0, isA ? particleBindGroups.hashA : particleBindGroups.hashB);
    cp1.dispatchWorkgroups(dispP);

    cp1.setPipeline(pipelines.scan1);
    cp1.setBindGroup(0, cellBindGroups.scan1);
    cp1.dispatchWorkgroups(WGCOUNT_S);

    cp1.setPipeline(pipelines.scan2);
    cp1.setBindGroup(0, cellBindGroups.scan2);
    cp1.dispatchWorkgroups(1);

    cp1.setPipeline(pipelines.scan3);
    cp1.setBindGroup(0, cellBindGroups.scan3);
    cp1.dispatchWorkgroups(WGCOUNT_S);

    cp1.setPipeline(pipelines.bgrid);
    cp1.setBindGroup(0, cellBindGroups.bgrid);
    cp1.dispatchWorkgroups(WGCOUNT_C);
    cp1.end();

    enc.copyBufferToBuffer(cellBuffers.prefix, 0, cellBuffers.offset, 0, C4);

    const cp2 = enc.beginComputePass({ label: 'physics-pass' });
    cp2.setPipeline(pipelines.scatter);
    cp2.setBindGroup(0, isA ? particleBindGroups.scatterA : particleBindGroups.scatterB);
    cp2.dispatchWorkgroups(dispP);

    cp2.setPipeline(pipelines.density);
    cp2.setBindGroup(0, isA ? particleBindGroups.densityA : particleBindGroups.densityB);
    cp2.dispatchWorkgroups(dispP);

    cp2.setPipeline(pipelines.force);
    cp2.setBindGroup(0, isA ? particleBindGroups.forceA : particleBindGroups.forceB);
    cp2.dispatchWorkgroups(dispP);

    cp2.setPipeline(pipelines.integ);
    cp2.setBindGroup(0, isA ? particleBindGroups.integA : particleBindGroups.integB);
    cp2.dispatchWorkgroups(dispP);
    cp2.end();

    device.queue.submit([enc.finish()]);
    [readState, writeState] = [writeState, readState];
}

// ─────────────────────────────────────────────────────────────────────────────
// 9. RENDER LOOP
// ─────────────────────────────────────────────────────────────────────────────
function renderLoop() {
    if (!isRendering) return;
    if (!particleBuffers) {
        animId = requestAnimationFrame(renderLoop);
        return;
    }
    const steps = parseInt(document.getElementById('steps-input').value) || 1;
    for (let i = 0; i < steps; i++) stepSimulation();

    device.queue.writeBuffer(aspectBuf, 0,
        new Float32Array([canvas.width / canvas.height, 0, 0, 0]));

    const enc = device.createCommandEncoder({ label: 'render' });
    const view = gpuCtx.getCurrentTexture().createView();
    const rp = enc.beginRenderPass({
        colorAttachments: [{ view, clearValue: [0.05, 0.05, 0.05, 1.0],
                             loadOp: 'clear', storeOp: 'store' }],
        depthStencilAttachment: { view: depthTex.createView(),
            depthClearValue: 1.0, depthLoadOp: 'clear', depthStoreOp: 'discard' },
    });

    const renderBG = readState.pos === particleBuffers.posA
        ? particleBindGroups.renderA : particleBindGroups.renderB;

    rp.setPipeline(pipelines.renderParticle);
    rp.setBindGroup(0, renderBG);
    rp.draw(N);

    rp.setPipeline(pipelines.renderBox);
    rp.setBindGroup(0, renderBG);
    rp.draw(24);                  // 12 edges × 2 vertices

    rp.end();
    device.queue.submit([enc.finish()]);
    animId = requestAnimationFrame(renderLoop);
}

// ─────────────────────────────────────────────────────────────────────────────
// 10. GPU SYNC FENCE
// ─────────────────────────────────────────────────────────────────────────────
async function forceGpuSync() {
    const enc = device.createCommandEncoder({ label: 'sync' });
    enc.copyBufferToBuffer(readState.pos, 0, syncBuf, 0, 16);
    device.queue.submit([enc.finish()]);
    await syncBuf.mapAsync(GPUMapMode.READ);
    syncBuf.unmap();
}

// ─────────────────────────────────────────────────────────────────────────────
// 11. BENCHMARK (differential T60 - T10)
// ─────────────────────────────────────────────────────────────────────────────
async function runBenchmark() {
    statsDiv.innerText = `Running Benchmark…
Particles: ${N.toLocaleString()}
Phase 1: 10 steps + sync…`;
    await new Promise(r => setTimeout(r, 60));

    const s10 = performance.now();
    for (let i = 0; i < 10; i++) stepSimulation();
    await forceGpuSync();
    const t10 = performance.now() - s10;

    statsDiv.innerText += '\nPhase 2: 60 steps + sync…';
    await new Promise(r => setTimeout(r, 60));

    const s60 = performance.now();
    for (let i = 0; i < 60; i++) stepSimulation();
    await forceGpuSync();
    const t60 = performance.now() - s60;

    const pure50 = t60 - t10;
    const perStep = pure50 / 50;
    const overhead = t10 - perStep * 10;
    const sps = 50 / (pure50 / 1000);

    statsDiv.innerText =
`─── Benchmark Complete ───
Particles : ${N.toLocaleString()}
Bounds X  : [${bounds.minX.toFixed(1)}, ${bounds.maxX.toFixed(1)}]
Bounds Y  : [${bounds.minY.toFixed(1)}, ${bounds.maxY.toFixed(1)}]
Bounds Z  : [${bounds.minZ.toFixed(1)}, ${bounds.maxZ.toFixed(1)}]

[Raw]
T10 : ${t10.toFixed(2)} ms
T60 : ${t60.toFixed(2)} ms

[Differential]
Pure 50 steps : ${pure50.toFixed(2)} ms
Per step      : ${perStep.toFixed(2)} ms
Sync overhead : ${overhead.toFixed(2)} ms
Throughput    : ${sps.toFixed(1)} SPS

(Press Start Render or Run Benchmark again at any time.)`;
}

// ─────────────────────────────────────────────────────────────────────────────
// 12. CONTROL — start / stop / restart without page refresh
// ─────────────────────────────────────────────────────────────────────────────
function stopAll() {
    isRendering = false;
    if (animId !== null) { cancelAnimationFrame(animId); animId = null; }
}

function readNFromInput() {
    const v = parseInt(document.getElementById('n-input').value);
    if (!Number.isFinite(v) || v < 64 || v > 524288) {
        statsDiv.innerText = 'ERROR: N must be 64..524288';
        return null;
    }
    return v;
}

async function startRender() {
    if (isBenchmarking) {
        statsDiv.innerText += '\n(Benchmark in progress, please wait.)';
        return;
    }
    await initWebGPU();
    buildPipelinesOnce();
    stopAll();

    const newN = readNFromInput();
    if (newN === null) return;
    buildParticleResources(newN);

    isRendering = true;
    statsDiv.innerText =
`Render mode running.
Particles: ${N.toLocaleString()}
Bounds editable LIVE via sliders.
Click Stop, then Start again to apply a new N.`;
    renderLoop();
}

async function startBenchmark() {
    if (isBenchmarking) return;
    await initWebGPU();
    buildPipelinesOnce();
    stopAll();

    const newN = readNFromInput();
    if (newN === null) return;
    buildParticleResources(newN);

    isBenchmarking = true;
    setBusy(true);
    try { await runBenchmark(); }
    finally {
        isBenchmarking = false;
        setBusy(false);
    }
}

function setBusy(b) {
    document.getElementById('btn-render').disabled    = b;
    document.getElementById('btn-benchmark').disabled = b;
    document.getElementById('btn-reset').disabled     = b;
}

// ─────────────────────────────────────────────────────────────────────────────
// 13. UI WIRING
// ─────────────────────────────────────────────────────────────────────────────
function setupBoundsSliders() {
    const cfg = [
        ['bx-min', 'minX', 'bx-min-val'], ['bx-max', 'maxX', 'bx-max-val'],
        ['by-min', 'minY', 'by-min-val'], ['by-max', 'maxY', 'by-max-val'],
        ['bz-min', 'minZ', 'bz-min-val'], ['bz-max', 'maxZ', 'bz-max-val'],
    ];
    for (const [id, key, lbl] of cfg) {
        const el = document.getElementById(id);
        const lb = document.getElementById(lbl);
        const handler = () => {
            const v = parseFloat(el.value);
            bounds[key] = v;
            lb.textContent = v.toFixed(1);
            updateParamsUniform();
        };
        el.addEventListener('input', handler);
    }
}

function updateBoundsLabels() {
    const set = (id, v) => { const e = document.getElementById(id);
                              if (e) e.textContent = v.toFixed(1); };
    set('bx-min-val', bounds.minX); set('bx-max-val', bounds.maxX);
    set('by-min-val', bounds.minY); set('by-max-val', bounds.maxY);
    set('bz-min-val', bounds.minZ); set('bz-max-val', bounds.maxZ);
}

document.getElementById('btn-render').addEventListener('click', () => {
    startRender().catch(e => { statsDiv.innerText = 'ERROR: ' + e.message;
                               console.error(e); });
});
document.getElementById('btn-benchmark').addEventListener('click', () => {
    startBenchmark().catch(e => { statsDiv.innerText = 'ERROR: ' + e.message;
                                  console.error(e); });
});
document.getElementById('btn-reset').addEventListener('click', () => {
    if (!particleBuffers) {
        statsDiv.innerText = 'No simulation initialised yet — press Start Render first.';
        return;
    }
    resetParticles();
    statsDiv.innerText = `Particles reset (${N.toLocaleString()}).`;
});
document.getElementById('btn-stop').addEventListener('click', () => {
    stopAll();
    statsDiv.innerText = 'Stopped. (Particles preserved — press Start Render to resume from current bounds.)';
});

window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    if (initialized && device) {
        depthTex.destroy?.();
        depthTex = device.createTexture({ label: 'depth',
            size: [canvas.width, canvas.height, 1],
            format: 'depth24plus', usage: GPUTextureUsage.RENDER_ATTACHMENT });
    }
});

setupBoundsSliders();
updateBoundsLabels();
</script>
